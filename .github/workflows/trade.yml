name: Nifty Hedge Trade

on:
  schedule:
    - cron: '40 3 * * 1-5'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: List files
        run: ls -la

      - name: Install dependencies
        run: pip install smartapi-python pyotp logzero websocket-client

      - name: Run Update strategy
        run: python Update strategy.py
